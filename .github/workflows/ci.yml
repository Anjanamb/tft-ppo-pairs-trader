name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install PyTorch (CPU build)
        # CPU wheel keeps CI light — no multi-GB CUDA download.
        run: pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff pytest

      - name: Lint
        run: ruff check src/ scripts/ tests/

      - name: Run tests
        # Data-dependent tests skip automatically (no DuckDB on a fresh checkout);
        # the synthetic model/agent/backtest tests run for real on CPU.
        run: pytest
